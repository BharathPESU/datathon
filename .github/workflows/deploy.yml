name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - main

jobs:
  test-and-build-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Optional: Add any linting/formatting or tests here
      # - name: Run Linter
      #   run: |
      #     cd backend
      #     pip install flake8
      #     flake8 . --exclude=venv,node_modules

  test-and-build-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Next.js Static Export
        run: |
          cd frontend
          # Ensure Next.js builds as a static export (requires 'output: export' in next.config.mjs)
          npm run build

  deploy:
    name: Deploy to Zoho Catalyst
    needs: [test-and-build-backend, test-and-build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Zoho Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Build Applications
        run: |
          # Build Next.js frontend
          cd frontend
          npm ci
          npm run build
          cd ..
          
          # Install backend dependencies to the deployment target
          cd backend
          python -m pip install -r requirements.txt -t ./ --upgrade

      - name: Deploy to Zoho Catalyst
        env:
          CATALYST_TOKEN: ${{ secrets.CATALYST_AUTH_TOKEN }}
        run: |
          # Deploy both AppSail backend and Slate frontend to India (IN) Data Center
          catalyst deploy --token "$CATALYST_TOKEN" --dc in --ignore-scripts
